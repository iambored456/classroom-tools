<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Digital Clock – Editable Schedule & Preferences</title>
  <script type="module" crossorigin src="/classroom-tools/class-clock/assets/index-OlWaX3zx.js"></script>
  <link rel="stylesheet" crossorigin href="/classroom-tools/class-clock/assets/index-Ba7htC_L.css">
</head>
<body>
  <!-- Main Clock Display Container -->
  <div id="clock-display-area">
      <div id="date" class="display-element"></div>
      <div id="schedule-circles-display" class="display-element"></div>
      <div id="time" class="display-element"></div>
      <div id="period-container" class="display-element">
        <div id="period-label"></div>
        <div id="progress-bar" class="display-element">
          <div id="progress"></div>
          <div id="time-left"></div>
        </div>
          <!-- Sand Bars Container -->
          <div id="sand-bars-container" class="display-element">
            <!-- Outline Divs (behind canvas) -->
            <div class="sand-bar-outline-segment"></div>
            <div class="sand-bar-outline-segment"></div>
            <div class="sand-bar-outline-segment"></div>
            <div class="sand-bar-outline-segment"></div>
            <div class="sand-bar-outline-segment"></div>
            <!-- Canvas for Matter.js (on top) -->
            <canvas id="sand-bars-canvas"></canvas>
          </div>

          <!-- Water Fill Container -->
          <div id="water-fill-container" class="display-element element-hidden">
            <div class="water-fill-outline-segment"></div>
            <div class="water-fill-outline-segment"></div>
            <div class="water-fill-outline-segment"></div>
            <div class="water-fill-outline-segment"></div>
            <div class="water-fill-outline-segment"></div>
            <canvas id="water-fill-canvas"></canvas>
          </div>

          <div id="stage-visualization-container" class="display-element element-hidden">
            <div class="stage-visualization-outline-segment"></div>
            <div class="stage-visualization-outline-segment"></div>
            <div class="stage-visualization-outline-segment"></div>
            <div class="stage-visualization-outline-segment"></div>
            <div class="stage-visualization-outline-segment"></div>
            <canvas id="stage-visualization-canvas"></canvas>
          </div>
      </div>
  </div>

  <!-- Menu Toggle Button -->
  <button id="menu-toggle" title="Settings">▼</button>

  <!-- Settings Pullout Menu Panel -->
  <div id="settings-menu">
    <div id="menu-resizer"></div>
    <nav id="settings-nav">
      <div class="nav-container">
        <div class="brand">
          <h1>Quinn Fleming's Learning Tools</h1>
        </div>
        <div class="nav-actions">
          <button
            id="nav-home-button"
            class="header-action-button"
            type="button"
            title="Back to app hub"
            aria-label="Back to app hub"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.5 10.5L12 3.75l8.5 6.75" />
              <path d="M6.5 9.75V20.25h11V9.75" />
              <path d="M10 20.25v-5.5h4v5.5" />
            </svg>
          </button>
          <button
            id="nav-fullscreen-button"
            class="header-action-button"
            type="button"
            title="Enter fullscreen"
            aria-label="Enter fullscreen"
            aria-pressed="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 4H4v4" />
              <path d="M16 4h4v4" />
              <path d="M20 16v4h-4" />
              <path d="M4 16v4h4" />
            </svg>
          </button>
        </div>
      </div>
    </nav>
    <div id="tabs">
      <button class="tab-button active" data-tab="appearance-tab">Appearance</button>
      <button class="tab-button" data-tab="schedule-alerts-tab">Schedule & Alerts</button>
    </div>
    <div id="tab-contents">

      <!-- Appearance Tab Content -->
      <div id="appearance-tab" class="tab-content active">
        <div class="settings-section">
            <div id="display-elements-checklist" class="preferences-container compact">
                 <div class="pref-row two-col">
                    <div class="pref-item checkbox-item"><label><input type="checkbox" id="pref-show-date" data-pref="showDate"> Show Date</label></div>
                    <div class="pref-item checkbox-item"><label><input type="checkbox" id="pref-show-time" data-pref="showTime"> Show Time</label></div>
                 </div>
                 <div class="pref-row two-col">
                    <div class="pref-item checkbox-item"><label><input type="checkbox" id="pref-show-schedule-label" data-pref="showScheduleLabel"> Show Schedule Label</label></div>
                    <div class="pref-item checkbox-item"><label><input type="checkbox" id="pref-show-schedule-circles" data-pref="showScheduleCircles"> Show Schedule Circles</label></div>
                 </div>
            </div>
        </div>

        <div class="settings-section">
            <h4>Timeline Visualization</h4>
            <div class="visualization-mode-grid">
                <label class="visualization-mode-card">
                    <input type="radio" name="visualization-mode" value="progress">
                    <span class="visualization-mode-title">Progress Bar</span>
                </label>
                <label class="visualization-mode-card">
                    <input type="radio" name="visualization-mode" value="sand">
                    <span class="visualization-mode-title">Sand Bars</span>
                </label>
                <label class="visualization-mode-card">
                    <input type="radio" name="visualization-mode" value="water">
                    <span class="visualization-mode-title">Water Bars</span>
                </label>
                <label class="visualization-mode-card">
                    <input type="radio" name="visualization-mode" value="candle">
                    <span class="visualization-mode-title">Candles</span>
                </label>
            </div>
             <div class="preferences-container compact slider-pref-list">
                 <div class="slider-pref-row">
                     <label for="pref-sand-width-slider">Visualization Width</label>
                     <div class="slider-stepper">
                         <button class="num-btn minus" aria-label="Decrease Visualization Width">-</button>
                         <div class="slider-track-shell">
                             <span class="slider-value" data-pref-value="sandWidth">80</span>
                             <input class="pref-slider" type="range" id="pref-sand-width-slider" data-pref="sandWidth" min="20" max="100" step="1" value="80" aria-label="Visualization Width">
                         </div>
                         <button class="num-btn plus" aria-label="Increase Visualization Width">+</button>
                     </div>
                 </div>
                 <div class="slider-pref-row">
                     <label>Viewport Heights</label>
                     <div class="multi-slider-panel" data-multi-slider>
                         <div class="multi-slider-track-shell">
                             <div class="multi-slider-track"></div>
                             <button class="multi-slider-thumb multi-slider-thumb-visualization" type="button" data-multi-pref="sandHeight" data-stack-index="0" data-step="1" aria-label="Visualization Height" aria-valuemin="8" aria-valuemax="42">
                                 <span data-pref-value="sandHeight">14</span>
                             </button>
                             <button class="multi-slider-thumb multi-slider-thumb-label" type="button" data-multi-pref="scheduleLabelFontSize" data-stack-index="1" data-step="1" aria-label="Label Height" aria-valuemin="1" aria-valuemax="10">
                                 <span data-pref-value="scheduleLabelFontSize">4</span>
                             </button>
                             <button class="multi-slider-thumb multi-slider-thumb-time" type="button" data-multi-pref="timeFontSize" data-stack-index="2" data-step="1" aria-label="Time Height" aria-valuemin="5" aria-valuemax="36">
                                 <span data-pref-value="timeFontSize">19</span>
                             </button>
                             <button class="multi-slider-thumb multi-slider-thumb-date" type="button" data-multi-pref="dateFontSize" data-stack-index="3" data-step="1" aria-label="Date Height" aria-valuemin="1" aria-valuemax="14">
                                 <span data-pref-value="dateFontSize">6</span>
                             </button>
                         </div>
                         <div class="multi-slider-legend" aria-hidden="true">
                             <span class="multi-slider-legend-item multi-slider-legend-visualization"><span class="multi-slider-dot"></span>Visualization</span>
                             <span class="multi-slider-legend-item multi-slider-legend-label"><span class="multi-slider-dot"></span>Label</span>
                             <span class="multi-slider-legend-item multi-slider-legend-time"><span class="multi-slider-dot"></span>Time</span>
                             <span class="multi-slider-legend-item multi-slider-legend-date"><span class="multi-slider-dot"></span>Date</span>
                         </div>
                     </div>
                 </div>
                 <div class="slider-pref-row">
                     <label for="pref-sand-particle-size-slider">Animation Detail</label>
                     <div class="slider-stepper">
                         <button class="num-btn minus" aria-label="Decrease Animation Detail Size">-</button>
                         <div class="slider-track-shell">
                             <span class="slider-value" data-pref-value="sandParticleSize">5</span>
                             <input class="pref-slider" type="range" id="pref-sand-particle-size-slider" data-pref="sandParticleSize" min="1" max="20" step="0.5" value="5" aria-label="Animation Detail Size">
                         </div>
                         <button class="num-btn plus" aria-label="Increase Animation Detail Size">+</button>
                     </div>
                 </div>
            </div>
            <button id="reset-timeline-visualization-defaults">Reset to Defaults</button>
        </div>

        <!-- Colour Schemes Section -->
        <div id="colour-scheme-settings" class="settings-section">
          <h4>Colour Schemes</h4>
          <div id="colour-scheme-tabs"></div>
          <div id="colour-scheme-content"></div>
           <button id="reset-schemes-defaults">Reset Schemes to Defaults</button>
        </div>
      </div>

      <!-- Schedule & Alerts Tab Content -->
      <div id="schedule-alerts-tab" class="tab-content">
        <div id="time-sync-section" class="settings-section">
          <h4>Time Synchronization</h4>
          <div id="sync-targets" class="school-sync-list"></div>
        </div>
        <div class="settings-section">
            <h4 id="class-schedule-title">Class Schedule</h4>
            <div class="schedule-table-wrap">
              <table id="schedule-table">
                <thead>
                  <tr>
                    <th>Drag</th><th>Label</th><th>Start</th><th>End</th><th>Duration</th><th>Scheme</th><th>Alert On?</th><th>Schedule Circles?</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <button id="delete-schedule-row">Delete Selected Row</button>
            <button id="add-schedule-row">Add Row Below Selected</button>
         </div>
      </div> <!-- End #schedule-alerts-tab -->
    </div> <!-- End #tab-contents -->
  </div> <!-- End #settings-menu -->

  <!-- Alert Settings Modal -->
  <div id="alert-modal" class="modal">
      <div class="modal-content">
          <span class="close-modal-btn">×</span>
          <h3 id="modal-title">Visual Alert Settings for Period</h3>
          <div id="modal-body"></div>
      </div>
  </div>

  <!-- Load main script as module - Vite injects dependencies -->
</body>
</html>
